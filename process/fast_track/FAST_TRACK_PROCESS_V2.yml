  - id: decision.acceptance.cli
    type: decision
    title: "Requer Acceptance de API/CLI?"
    executor: python
    sprint: sprint-06-smoke
    condition: interface_type
    branches:
      ui: ft.smoke.01.cli_run
      _default: ft.acceptance.01.cli
    next: ft.acceptance.01.cli

  # ================================================================
  # Fase 6: Smoke + Acceptance CLI
  # ================================================================

  - id: ft.acceptance.01.cli
    type: build
    title: "Acceptance Test CLI — Validar API com Massa de Dados"
    executor: llm_coder
    sprint: sprint-06-smoke
    max_turns: 80
    outputs:
      - project/docs/acceptance-cli-report.md
    write_scope:
      - main.py
      - src/
      - tests/
      - project/docs/
    prompt: |
      Execute os testes de aceitação da API usando a massa de dados de teste.
      ESTE STEP É IMPLEMENTAÇÃO-FIRST: se a API falhar, corrija o backend e reexecute
      os testes no mesmo step. Não pare no primeiro FAIL.

      Leia obrigatoriamente:
        - project/docs/test_data.md     (massa de dados para inserção)
        - project/docs/tech_stack.md    (interface_type e stack)
        - project/docs/api_contract.md  (FONTE DE VERDADE dos endpoints HTTP)
        - main.py                       (entry point atual do servidor)
        - src/                          (domínio e routers existentes)

      SE interface_type for cli_only:
        Rode a CLI com os dados de test_data.md como argumentos, verificando
        cada operação. Escreva project/docs/acceptance-cli-report.md com os
        resultados e encerre com DONE.

      SE interface_type for ui:
        Escreva um relatório mínimo em project/docs/acceptance-cli-report.md dizendo
        que o acceptance de API foi pulado porque interface_type=ui e encerre com DONE.

      SE interface_type for api ou mixed:
        0. Leia main.py para descobrir a porta do servidor (linha `uvicorn.run(..., port=XXXX)`).
           Se o servidor não estiver rodando, inicie-o com:
           `SECRET_KEY=dev-test-key nohup python -m uvicorn main:app --host 127.0.0.1 --port XXXX &`
           e aguarde 3 segundos.
        1. Garanta AMBIENTE LIMPO antes de cada rodada:
           - pare o servidor anterior se estiver rodando
           - delete arquivos `*.db` e `*.sqlite` do projeto, se existirem
           - reinicie o servidor
        2. Descubra os endpoints: GET http://localhost:XXXX/openapi.json
        3. Rode a aceitação para cada entidade em test_data.md:
           a. Identifique o endpoint de criação correto (POST)
           b. Faça POST com cada registro da entidade
           c. Verifique que o registro persistiu (GET e compare campos-chave)
           d. Documente: endpoint, payload, status code, resultado PASS ou FAIL

        4. REGRA DE AUTO-CORREÇÃO:
           - se qualquer POST retornar 404, 422 inesperado ou não persistir, NÃO pare
           - corrija o backend imediatamente para aderir EXATAMENTE ao api_contract.md
           - edite `main.py` e/ou `src/` quantas vezes forem necessárias
           - reinicie o servidor
           - rode a aceitação inteira novamente a partir do banco limpo
           - repita até o relatório ficar sem FAILs ou até esgotar o budget de turns

        5. Só escreva o relatório final depois da última rodada executada:

          # Acceptance CLI Report

          ## Resumo
          - Total: N registros testados
          - PASS: X  |  FAIL: Y

          ## Resultados por Entidade
          ### <Entidade>
          - [PASS] POST /endpoint — <identificador do registro> — 201
          - [FAIL] POST /endpoint — <identificador> — 404 (endpoint não existe)

          ## Falhas Encontradas
          - endpoint, payload enviado, resposta recebida, causa provável

      REGRA CRÍTICA: o relatório deve refletir a ÚLTIMA rodada executada. Se ainda houver
      FAILs após tentar corrigir, registre os FAILs reais — não minta.

      REGRA DADOS: Sempre comece com banco de dados limpo. Antes de inserir qualquer
      registro, verifique se o banco já tem dados (GET no endpoint de listagem principal).
      Se tiver dados, isso é dado stale de execução anterior — deve-se parar o servidor,
      deletar o arquivo de banco (ex: *.db, *.sqlite), reiniciar o servidor, e só então
      semear os dados do test_data.md. NUNCA teste contra dados de um projeto anterior.

      Ao final diga DONE.
    validators:
      - file_exists: project/docs/acceptance-cli-report.md
      - min_lines: 20
    next: gate.acceptance.cli

