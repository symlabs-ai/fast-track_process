  # ================================================================
  # Fase 9: Auditoria
  # ================================================================

  - id: ft.audit.01.forgebase
    type: build
    title: "Auditoria ForgeBase"
    executor: llm_coder
    sprint: sprint-09-audit
    max_turns: 80
    outputs:
      - project/docs/forgebase-audit.md
    write_scope:
      - main.py
      - src/
      - tests/
      - project/docs/
    prompt: |
      ATENÇÃO: Este step exige IMPLEMENTAÇÃO de código, não apenas documentação.
      O gate seguinte vai rodar `gate_pulse_instrumented` no código — ele falha se
      os tracks não existirem fisicamente nos arquivos. Escrever "IMPLEMENTADO" no
      documento sem escrever o código NÃO passa o gate.

      === PASSO 1: LEITURA OBRIGATÓRIA ===

      Leia antes de qualquer outra coisa:
        - project/docs/tech_stack.md
        - project/docs/PRD.md
        - src/ ou backend/ (código do servidor — leia o entry point completo)
        - frontend/src/ (se existir)

      === PASSO 2: VERIFICAR FORGEBASE PULSE NO CÓDIGO ===

      Grep nos arquivos (src/ ou backend/) para cada um dos 5 tracks:
        - track-infra:    /health com SELECT 1 ou equivalente (verifica DB)
        - track-erro:     @app.exception_handler(HTTPException)
        - track-negocio:  endpoints de criação/atualização de entidades principais
        - track-perf:     middleware com X-Process-Time-Ms (time.monotonic)
        - track-dx:       @app.exception_handler(Exception) para erros 500

      Para cada track: anote IMPLEMENTADO (arquivo:linha) ou AUSENTE.

      === PASSO 3: IMPLEMENTAR TRACKS AUSENTES (obrigatório) ===

      Para CADA track AUSENTE — escreva o código agora, não pule esta etapa:
        1. Abra o entry point do servidor (main.py ou equivalente)
        2. Adicione o código do track ausente
        3. Salve o arquivo
        4. Releia o arquivo para confirmar que o código está lá

      Referência FastAPI (adapte ao stack do projeto):

        import time
        from fastapi import Request
        from fastapi.responses import JSONResponse
        from fastapi.exceptions import HTTPException

        # track-perf
        @app.middleware("http")
        async def process_time_middleware(request: Request, call_next):
            start = time.monotonic()
            response = await call_next(request)
            elapsed_ms = round((time.monotonic() - start) * 1000, 2)
            response.headers["X-Process-Time-Ms"] = str(elapsed_ms)
            return response

        # track-erro
        @app.exception_handler(HTTPException)
        async def http_exception_handler(request: Request, exc: HTTPException):
            return JSONResponse(status_code=exc.status_code, content={"detail": exc.detail})

        # track-dx
        @app.exception_handler(Exception)
        async def global_exception_handler(request: Request, exc: Exception):
            return JSONResponse(status_code=500, content={"detail": "Erro interno do servidor"})

        # track-infra (health)
        @app.get("/health")
        async def health():
            # execute SELECT 1 no banco aqui
            return {"status": "ok"}

      === PASSO 4: AUDITORIA GERAL ===

      Documente em project/docs/forgebase-audit.md usando o template:
      1. ESTRUTURA: lint limpo, imports organizados, sem código morto
      2. TESTES: cobertura estimada, unitários e smoke presentes
      3. SEGURANÇA: sem secrets hardcodados, sem SQL injection, sem XSS
      4. FORGEBASE PULSE: status final de cada track (IMPLEMENTADO arquivo:linha)

      === PASSO 5: VERIFICAÇÃO FINAL ===

      Antes de dizer DONE:
        1. Releia o entry point do servidor
        2. Confirme visualmente que os 5 tracks estão no código
        3. Atualize o documento com o status final
        4. Só então diga DONE

      Se qualquer track ainda estiver AUSENTE, volte ao Passo 3.
    validators:
      - file_exists: project/docs/forgebase-audit.md
      - min_lines: 20
      - tests_pass: true
      - gate_pulse_instrumented: true
    next: gate.audit

