# Fast Track Process V2 — formato de grafo para ft engine
# Mapeamento completo: 28 steps, 10 fases, validators deterministicos
# v0.8.0: suporte a frontend/PWA com decision node por interface_type
# v0.8.17: gate_pulse_instrumented adicionado a ft.audit.01.forgebase; prompt reestruturado
#           para implementação-first; REGRA DADOS generalizada (sem hardcode de .db filename)
# v0.8.18: acceptance CLI de API passa a ser pulado para interface_type=ui
# v0.8.19: ft.prd.rewrite passa a preservar Hipotese/Visao/User Stories via baseline
#           determinístico; reescrita automática não pode alterar visão/escopo sem stakeholder

id: fast_track_v2
version: "0.8.19"
title: "ForgeProcess — Fast Track V2"

nodes:
  # ================================================================
  # Fase 1: MDD — Market Driven Development
  # ================================================================

  - id: ft.mdd.01.hipotese
    type: discovery
    title: "Capturar Hipotese"
    executor: llm_coach
    sprint: sprint-01-mdd
    outputs:
      - project/docs/hipotese.md
    requires_approval: true
    validators:
      - file_exists: project/docs/hipotese.md
      - min_lines: 10
      - has_sections:
          - Problema
          - Oportunidade
    next: ft.mdd.02.prd

  - id: ft.mdd.02.prd
    type: document
    title: "Redigir PRD"
    executor: llm_coach
    sprint: sprint-01-mdd
    outputs:
      - project/docs/PRD.md
    requires_approval: true
    prompt: |
      Você é o product coach responsável por redigir o PRD do produto.

      Com base na hipótese disponível em project/docs/hipotese.md, produza o arquivo
      project/docs/PRD.md com as seguintes seções obrigatórias:

      ## Hipotese
      (resumo da hipótese de produto)

      ## Visao
      (visão do produto, problema, público-alvo e solução)

      ## User Stories
      (mínimo 3 user stories no formato exato abaixo — obrigatório)

      ### US-01 — <título>
      **Como** <persona>, **quero** <ação>, **para** <benefício>.

      ### US-02 — <título>
      ...

      ### US-03 — <título>
      ...

      IMPORTANTE: as user stories DEVEM usar o formato `### US-XX` (heading nível 3 com prefixo US-).
      Sem esse formato, a validação falhará.
    validators:
      - file_exists: project/docs/PRD.md
      - min_lines: 30
      - has_sections:
          - Hipotese
          - Visao
          - User Stories
      - min_user_stories: 3
    next: ft.mdd.03.validacao

  - id: ft.mdd.03.validacao
    type: gate
    title: "Validar PRD"
    executor: python
    sprint: sprint-01-mdd
    outputs:
      - project/docs/PRD.md
    validators:
      - file_exists: project/docs/hipotese.md
      - file_exists: project/docs/PRD.md
      - min_lines: 30
    next: ft.plan.01.task_list

  # ================================================================
  # Fase 2: Planning
  # ================================================================

  - id: ft.plan.01.task_list
    type: document
    title: "Criar Task List"
    executor: llm_coach
    sprint: sprint-02-planning
    outputs:
      - project/docs/TASK_LIST.md
    validators:
      - file_exists: project/docs/TASK_LIST.md
      - min_lines: 20
    next: ft.plan.02.tech_stack

  - id: ft.plan.02.tech_stack
    type: document
    title: "Propor Tech Stack"
    executor: llm_coder
    sprint: sprint-02-planning
    outputs:
      - project/docs/tech_stack.md
    requires_approval: true
    prompt: |
      Proponha o Tech Stack para o projeto com base no PRD e na hipotese.
      OBRIGATORIO: inclua uma linha no formato exato:
        interface_type: <valor>
      onde <valor> e um de: cli_only, api, ui, mixed
      - cli_only: apenas CLI, sem interface grafica ou web
      - api: apenas REST/GraphQL, sem frontend proprio
      - ui: inclui interface web/PWA/mobile
      - mixed: CLI + interface web

      REGRA CRITICA: se o projeto tem backend Python/Node/Go/etc. E um frontend
      separado (React, Vue, HTML), o interface_type DEVE ser `mixed` — nunca `ui`.
      `ui` so e valido para projetos 100% frontend sem backend proprio (ex: SPA
      consumindo APIs de terceiros). Quando houver backend proprio + frontend,
      use `mixed` obrigatoriamente, independentemente do que o PRD disser.

      Produza o documento project/docs/tech_stack.md com todas as secoes usuais
      (linguagem, frameworks, dependencias, deploy) mais a linha interface_type.
    validators:
      - file_exists: project/docs/tech_stack.md
      - min_lines: 10
      - has_sections:
          - interface_type
    next: ft.plan.03.diagrams

  - id: ft.plan.03.diagrams
    type: document
    title: "Gerar Diagramas Tecnicos"
    executor: llm_coder
    sprint: sprint-02-planning
    outputs:
      - project/docs/diagrams/architecture.md
    validators:
      - file_exists: project/docs/diagrams/architecture.md
      - min_lines: 5
    next: ft.plan.04.test_data

  - id: ft.plan.04.test_data
    type: document
    title: "Gerar Massa de Dados para Aceitação"
    executor: llm_coach
    sprint: sprint-02-planning
    outputs:
      - project/docs/test_data.md
    prompt: |
      Com base nas User Stories do PRD, gere uma massa de dados de teste realista
      para validar a API e o frontend de ponta a ponta.

      Leia obrigatoriamente:
        - project/docs/PRD.md         (user stories e entidades do domínio)
        - project/docs/TASK_LIST.md   (funcionalidades a implementar)

      Produza project/docs/test_data.md com dados inventados mas realistas,
      cobrindo TODAS as entidades do domínio. Para cada entidade:
        - mínimo 3 registros
        - variação de estados (ex: cobrança pendente, vencida, paga)
        - dados que exercitem edge cases das user stories

      Formato obrigatório por entidade:
        ## <NomeEntidade>
        ### Registro 1
        - campo: valor
        ...

      Ao final diga DONE e liste as entidades e a quantidade de registros gerados.
    validators:
      - file_exists: project/docs/test_data.md
      - min_lines: 30
    next: ft.plan.05.api_contract

  - id: ft.plan.05.api_contract
    type: document
    title: "Definir Contrato de API"
    executor: llm_coach
    sprint: sprint-02-planning
    outputs:
      - project/docs/api_contract.md
    requires_approval: true
    prompt: |
      Defina o contrato de API do projeto ANTES de qualquer código ser escrito.
      Este documento é a fonte de verdade — frontend e backend DEVEM seguir
      esses nomes de endpoint exatamente, sem desvios.

      Leia obrigatoriamente:
        - project/docs/PRD.md         (entidades e user stories)
        - project/docs/tech_stack.md  (interface_type e stack)
        - project/docs/test_data.md   (entidades da massa de dados)

      SE interface_type for cli_only:
        Escreva um api_contract.md mínimo indicando que não há API HTTP
        e encerre com DONE.

      SE interface_type for api ou mixed:
        Produza project/docs/api_contract.md com todos os endpoints HTTP.

        REGRAS OBRIGATÓRIAS:
        1. Escolha UM idioma para os paths (o mesmo do PRD) e use-o em TODOS
           os endpoints — NUNCA misture português e inglês nos paths
        2. Use substantivos no plural para coleções (ex: /clientes, não /cliente)
        3. Inclua SEMPRE: GET /health retornando {"status": "ok"}
        4. Nomes de path devem ser lowercase sem acentos (ex: /cobrancas, não /cobranças)

        Formato obrigatório por recurso:

          ## <NomeRecurso>
          | Método | Path | Descrição | Request Body | Response |
          |--------|------|-----------|--------------|----------|
          | POST   | /recurso | criar | {campo: tipo} | {id, ...} |
          | GET    | /recurso | listar | — | [{...}] |
          | GET    | /recurso/{id} | buscar por ID | — | {...} |

        Ao final diga DONE e liste o total de endpoints definidos.
    validators:
      - file_exists: project/docs/api_contract.md
      - min_lines: 20
    next: gate.planning

  - id: gate.planning
    type: gate
    title: "Gate de Planning"
    executor: python
    sprint: sprint-02-planning
    validators:
      - file_exists: project/docs/TASK_LIST.md
      - file_exists: project/docs/tech_stack.md
      - file_exists: project/docs/diagrams/architecture.md
      - file_exists: project/docs/test_data.md
      - file_exists: project/docs/api_contract.md
    next: ft.plan.05b.ui_criteria

  - id: ft.plan.05b.ui_criteria
    type: document
    title: "Gerar Critérios Visuais de UI"
    executor: llm_coach
    sprint: sprint-02-planning
    outputs:
      - project/docs/ui_criteria.md
    requires_approval: true
    prompt: |
      Gere o arquivo project/docs/ui_criteria.md para o projeto atual.

      PASSO 1 — Leia obrigatoriamente:
        - project/docs/PRD.md          (especialmente a seção Contrato de Navegação UI)
        - project/docs/tech_stack.md   (para verificar interface_type)

      PASSO 2 — Se interface_type for cli_only ou api:
        Crie um ui_criteria.md mínimo com o conteúdo abaixo e encerre com DONE:
          # UI Criteria — <nome do projeto>
          interface_type: <valor> — sem frontend, critérios visuais não aplicáveis.

      PASSO 3 — Se interface_type for ui ou mixed:
        Gere project/docs/ui_criteria.md com este formato exato:

          # UI Criteria — <nome do projeto>

          ## Critérios obrigatórios (bloqueiam — LLM tenta corrigir se falharem)
          - [ ] C1: Todas as rotas carregam sem erro (sem tela branca, sem "Cannot GET")
          - [ ] C2: Navegação principal visível em todas as telas
          - [ ] C6: Conteúdo ou empty state presente (sem página em branco)
          <adicione critérios específicos derivados do PRD — ex: FAB do Assistente, se previsto>

          ## Critérios de qualidade (bloqueiam — LLM tenta corrigir se falharem)
          - [ ] C3: Cada item do nav tem ícone acima do label
          - [ ] C4: Estado ativo distinguível dos inativos
          - [ ] C7: Layout sem overflow horizontal em viewport mobile (390px)
          <adicione critérios de qualidade específicos do produto, se houver>

        REGRA: Derive critérios do PRD — não invente. Se o PRD menciona FAB do Assistente,
        adicione como critério. Se menciona badges de status, adicione. Se nada específico,
        os 7 padrão acima são suficientes.

        Ao final diga DONE.
    validators:
      - file_exists: project/docs/ui_criteria.md
      - min_lines: 5
    next: ft.plan.detect_interface

  - id: ft.plan.detect_interface
    type: gate
    title: "Detectar Interface Type"
    executor: python
    sprint: sprint-02-planning
    validators:
      - read_artifact:
          path: project/docs/tech_stack.md
          key: interface_type
          pattern: 'interface_type:\s*(\w+)'
    next: decision.interface_type

  - id: decision.interface_type
    type: decision
    title: "Requer Frontend?"
    executor: python
    sprint: sprint-02-planning
    condition: interface_type
    branches:
      cli_only: ft.tdd.02.red
      api: ft.tdd.02.red
      _default: ft.frontend.01.scaffold
    next: ft.tdd.02.red

  # ================================================================
  # Fase 3: Frontend/PWA (apenas quando interface_type = ui ou mixed)
  # ================================================================

  - id: ft.frontend.01.scaffold
    type: build
    title: "Scaffold Frontend"
    executor: llm_coder
    sprint: sprint-03-frontend
    outputs:
      - frontend/package.json
      - frontend/index.html
      - frontend/public/manifest.json
    prompt: |
      Crie a estrutura base do projeto frontend com suporte a PWA.
      Baseie-se no tech_stack.md para escolher o framework.

      Estrutura minima obrigatoria:
        frontend/
          package.json             dependencias e scripts npm (build, dev, preview)
          vite.config.js           bundler config (IMPORTANTE: veja template abaixo)
          index.html               RAIZ do Vite — HTML base com <link rel="manifest"> e <div id="root">
          public/
            manifest.json          PWA manifest com: name, short_name, start_url, display, theme_color, background_color, icons
          src/
            main.js                entry point

      ATENCAO CRITICA: o Vite exige que index.html esteja em frontend/index.html (raiz
      do frontend), NAO em frontend/public/index.html. Colocar em public/ e um erro
      fatal — o servidor retorna 404 em todas as requisicoes.

      O arquivo vite.config.js DEVE conter exatamente este proxy para integrar com o backend:

        import { defineConfig } from 'vite'

        export default defineConfig({
          server: {
            proxy: {
              '/api': {
                target: 'http://localhost:8000',
                changeOrigin: true,
                rewrite: (path) => path.replace(/^\/api/, ''),
              },
            },
          },
        })

      A linha rewrite e OBRIGATORIA. Sem ela, o backend recebe /api/rota em vez de
      /rota e retorna 404 em todas as chamadas do frontend.

      NAO implemente telas ainda. Apenas o scaffold funcional.
      Ao final diga DONE e liste os arquivos criados.
    validators:
      - file_exists: frontend/package.json
      - file_exists: frontend/index.html
      - file_exists: frontend/public/manifest.json
    next: ft.frontend.02.implement

  - id: ft.frontend.02.implement
    type: build
    title: "Implementar Frontend"
    executor: llm_coder
    sprint: sprint-03-frontend
    outputs:
      - frontend/src/
    prompt: |
      Implemente as telas e funcionalidades do frontend com base nas User Stories do PRD.

      Leia obrigatoriamente antes de implementar:
        - project/docs/PRD.md            (user stories e contrato de navegação)
        - project/docs/api_contract.md   (FONTE DE VERDADE dos endpoints — use EXATAMENTE esses paths)

      Diretrizes:
      - Cada User Story que envolve interface deve ter ao menos uma tela/componente
      - NAVEGACAO OBRIGATORIA: toda secao do PRD que possui tela dedicada DEVE aparecer
        no bottom navigation bar (ou em menu lateral com rotulo textual visivel).
        E proibido usar apenas icones sem texto ou acoes escondidas no AppBar para
        secoes principais. O usuario deve identificar todas as telas sem explorar a UI.
      - ROTEAMENTO COM URL: use BrowserRouter com <Route path="..."> para cada tela —
        cada tela deve ter uma URL própria (ex: /clientes, /agenda) para que deep links
        e navegação direta funcionem
      - Use o framework definido no tech_stack.md e o scaffold existente em frontend/
      - Service worker deve cachear assets estaticos (cache-first)
      - UI responsiva, mobile-first
      - Conecte ao backend via fetch/axios usando EXATAMENTE os paths do api_contract.md

      Produza os arquivos em frontend/src/.
      Ao final diga DONE e liste os arquivos criados.
    validators:
      - file_exists: frontend/src/
    next: gate.frontend

  - id: gate.frontend
    type: gate
    title: "Gate Frontend"
    executor: python
    sprint: sprint-03-frontend
    validators:
      - file_exists: frontend/package.json
      - file_exists: frontend/index.html
      - file_exists: frontend/public/manifest.json
      - file_exists: frontend/src/
      - gate_frontend: true
    next: ft.frontend.03.prd_review

  - id: ft.frontend.03.prd_review
    type: review
    title: "Revisao PRD — Conformidade de Arquitetura"
    executor: llm_coder
    sprint: sprint-03-frontend
    outputs:
      - project/docs/frontend-prd-review.md
    requires_approval: false
    prompt: |
      Voce e um arquiteto de software revisando se o frontend implementado esta em
      conformidade com o PRD do projeto. Sua tarefa e: APROVAR ou REJEITAR.

      PASSO 1 — Leia obrigatoriamente:
        - project/docs/PRD.md  (todos os requisitos funcionais e de navegacao)
        - frontend/src/App.jsx  (rotas implementadas)
        - frontend/src/  (componentes relevantes de navegacao e layout)

      PASSO 2 — Derive a checklist a partir do PRD lido.
        NÃO use uma checklist fixa. Para cada requisito de frontend presente no PRD,
        crie um item verificável. Exemplos do que buscar no PRD:
          - Quais rotas/páginas são exigidas?
          - Qual é a estrutura de navegação definida (bottom nav, sidebar, tabs)?
          - Quantos e quais itens de navegação o PRD especifica?
          - Existem componentes globais exigidos (FAB, header, etc.)?
          - Quais fluxos de autenticação são necessários?
          - Existem páginas públicas (sem login)?
        Use APENAS itens que consigues rastrear diretamente ao PRD.
        Se o PRD não menciona algo, não adicione na checklist.

      PASSO 3 — Para cada item da checklist derivada, verifique o código e marque:
        - [x] item passou — breve justificativa com arquivo/linha
        - [ ] item falhou — descreva o que está ausente ou incorreto

      PASSO 4 — Escreva o relatório em project/docs/frontend-prd-review.md:

        # Frontend PRD Review

        ## Veredicto: APPROVED  (ou REJECTED)

        ## Checklist
        - [x] ou [ ] item rastreável ao PRD: observação

        ## Problemas Encontrados (se REJECTED)
        - descrição do problema, referência ao requisito no PRD, o que precisa ser corrigido

        ## Conformidades (sempre listar)
        - o que foi implementado corretamente em relação ao PRD

        ## Observação Final
        - Seções do PRD utilizadas como fonte da checklist

      REGRA: Só rejeite por itens que estejam explicitamente no PRD.
      Não invente requisitos. Se o PRD não especifica, marque N/A ou omita o item.
      Apenas responda APPROVED se todos os itens rastreáveis ao PRD passarem.
    validators:
      - file_exists: project/docs/frontend-prd-review.md
      - min_lines: 10
    next: ft.frontend.04.screenshot_review

  - id: ft.frontend.04.screenshot_review
    type: review
    title: "Screenshot Review — Validação Visual do Frontend"
    executor: llm_coder
    sprint: sprint-03-frontend
    max_turns: 100
    outputs:
      - project/docs/screenshot-review.md
      - project/docs/screenshots/
      - frontend/src/
    requires_approval: true
    prompt: |
      Você é um revisor visual de frontend. Capture screenshots de todas as rotas,
      avalie contra os critérios do projeto e corrija falhas encontradas.

      PASSO 1 — Preparação
        Leia:
          - project/docs/ui_criteria.md   (critérios visuais do projeto)
          - frontend/src/App.jsx           (rotas definidas via <Route path=...>)
        Se ui_criteria.md não existir, use estes critérios mínimos:
          - C1: Rota carrega sem erro (sem tela branca, sem "Cannot GET")
          - C2: Navegação principal visível
          - C6: Conteúdo ou empty state presente
          - C7: Layout sem overflow horizontal em viewport mobile (390px)

      PASSO 2 — Build e serve do frontend
        Execute na raiz do projeto:
          cd frontend && npm run build
          npx serve -s dist -l 4173 &
          sleep 2

      PASSO 3 — Capture screenshots com Playwright
        Instale se necessário:
          pip install playwright && playwright install chromium
        Para CADA rota definida em App.jsx (<Route path=...>):
          - Crie e execute um script Python temporário que:
            * Abre a rota em http://localhost:4173<path> com Playwright
            * Viewport: 390×844 (mobile)
            * Aguarda 1s após load para renderização completa
            * Salva em project/docs/screenshots/<slug>.png
              (slug = path sem leading slash; "/" → "index")
          - Confirme que o arquivo PNG foi criado

      PASSO 4 — Avalie cada screenshot
        Use a ferramenta Read em cada PNG (são imagens — avalie visualmente).
        Para cada critério em ui_criteria.md, marque: PASS ou FAIL com observação.

      PASSO 5 — Corrija falhas
        Para cada critério que falhou:
          - Identifique o arquivo responsável (Layout.jsx, App.jsx, CSS, etc.)
          - Aplique a correção mínima necessária
          - Rebuilde: cd frontend && npm run build
          - Recapture apenas as rotas afetadas
          - Reavalie o critério

      PASSO 6 — Gere o relatório
        Crie project/docs/screenshot-review.md com este formato:

          # Screenshot Review — <nome do projeto>
          Data: <hoje>

          | Rota | Screenshot | C1 | C2 | C3 | C4 | C5 | C6 | C7 |
          |------|-----------|----|----|----|----|----|----|-----|
          | /    | screenshots/index.png | ✅ | ✅ | ✅ | ✅ | N/A | ✅ | ✅ |
          | ...  | ...                   | ...                        |

          ## Correções Aplicadas
          - <arquivo>: <descrição da correção>
          (se nenhuma: "Nenhuma correção necessária")

          Veredicto: APPROVED

        REGRA: O Veredicto só pode ser APPROVED se TODOS os critérios listados
        em ui_criteria.md estiverem marcados com ✅ (ou N/A se não aplicável).
        Se algum critério permanece ❌ após as tentativas de correção, escreva
        Veredicto: REJECTED e descreva o bloqueador.
        Encerre dizendo DONE.
    validators:
      - file_exists: project/docs/screenshot-review.md
      - screenshot_review_passed: true
    next: ft.tdd.02.red

  # ================================================================
  # Fase 4: TDD
  # ================================================================

  - id: ft.tdd.02.red
    type: test_red
    title: "Red — Escrever Testes"
    executor: llm_coder
    sprint: sprint-04-tdd
    outputs:
      - tests/
    validators:
      - tests_exist: tests/
      - tests_fail: true
    next: ft.tdd.03.green

  - id: ft.tdd.03.green
    type: test_green
    title: "Green — Implementar"
    executor: llm_coder
    sprint: sprint-04-tdd
    max_turns: 100
    outputs:
      - src/
    validators:
      - tests_pass: true
    next: gate.tdd

  - id: gate.tdd
    type: gate
    title: "Gate TDD"
    executor: python
    sprint: sprint-04-tdd
    validators:
      - tests_pass: true
    next: ft.delivery.00.entrypoint

  # ================================================================
  # Fase 5: Delivery
  # ================================================================

  - id: ft.delivery.00.entrypoint
    type: build
    title: "Criar Entry Point HTTP"
    executor: llm_coder
    sprint: sprint-05-delivery
    outputs:
      - main.py
    prompt: |
      Crie o entry point HTTP do projeto: main.py na raiz.

      Leia obrigatoriamente:
        - project/docs/tech_stack.md     (interface_type e stack)
        - project/docs/api_contract.md   (FONTE DE VERDADE dos endpoints — implemente EXATAMENTE esses paths)
        - project/docs/PRD.md            (seção 8.6 Contrato de Integração HTTP)
        - src/                           (domínio existente para registrar os routers)

      SE interface_type for cli_only: escreva main.py mínimo com `if __name__ == '__main__': pass`
      e encerre com DONE.

      SE interface_type for api ou mixed:
        1. OBRIGATORIO — adicione sys.path no topo do arquivo, ANTES de qualquer import:
             import sys
             from pathlib import Path
             sys.path.insert(0, str(Path(__file__).parent / "src"))
           Sem isso, `from backend.app.*` falha quando o processo sobe via `uvicorn main:app`.
        2. Instancie `app = FastAPI(title="<nome do projeto>")`
        3. Inclua todos os routers existentes em src/ (via `app.include_router`)
        4. Adicione `GET /health` retornando `{"status": "ok"}` — OBRIGATORIO na raiz (/health),
           NAO em /api/health. O gate_server_starts testa exatamente http://host/health.
           Se quiser expor tambem em /api/health, adicione os dois decorators no mesmo handler.
        5. Configure CORS para `http://localhost:5173` (se mixed)
        6. Adicione bloco `if __name__ == '__main__': uvicorn.run(app, host='0.0.0.0', port=8000)`

      O arquivo deve ser inicializável com:
        uvicorn main:app --host 0.0.0.0 --port 8000

      Ao final diga DONE e mostre as rotas registradas.
    validators:
      - file_exists: main.py
      - tests_pass: true
    next: ft.delivery.01.self_review

