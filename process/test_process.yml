# Processo de teste — 5 steps para validar o motor
# Simula um mini-ciclo: discovery → doc → build → gate → done

id: test_process
version: "0.1.0"
title: "Processo de Teste"

nodes:
  - id: step.01.hipotese
    type: discovery
    title: "Hipotese do produto"
    executor: llm_coach
    outputs:
      - project/docs/hipotese.md
    requires_approval: true
    validators:
      - file_exists: project/docs/hipotese.md
      - min_lines: 5
    next: step.02.prd

  - id: step.02.prd
    type: document
    title: "PRD simplificado"
    executor: llm_coach
    outputs:
      - project/docs/PRD.md
    validators:
      - file_exists: project/docs/PRD.md
      - has_sections:
          - Hipotese
          - Visao
          - User Stories
      - min_lines: 20
    next: step.03.implementacao

  - id: step.03.implementacao
    type: build
    title: "Implementar funcionalidade basica"
    executor: llm_coder
    outputs:
      - src/main.py
    validators:
      - file_exists: src/main.py
      - tests_pass: true
    next: step.04.gate

  - id: step.04.gate
    type: gate
    title: "Gate de qualidade"
    executor: python
    validators:
      - file_exists: src/main.py
      - file_exists: project/docs/PRD.md
      - tests_pass: true
    next: step.05.done

  - id: step.05.done
    type: end
    title: "Processo completo"
