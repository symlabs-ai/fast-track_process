# Processo de teste v2 — com sprints, gates compostos e decisions
# Valida Fase 2: sprint boundaries, gate_delivery, decision nodes

id: test_process_v2
version: "0.2.0"
title: "Processo de Teste v2 (Sprints)"

nodes:
  # Sprint 1: Discovery
  - id: step.01.hipotese
    type: discovery
    title: "Hipotese do produto"
    executor: llm_coach
    sprint: sprint-01-discovery
    outputs:
      - project/docs/hipotese.md
    requires_approval: true
    validators:
      - file_exists: project/docs/hipotese.md
      - min_lines: 5
    next: step.02.prd

  - id: step.02.prd
    type: document
    title: "PRD simplificado"
    executor: llm_coach
    sprint: sprint-01-discovery
    outputs:
      - project/docs/PRD.md
    validators:
      - file_exists: project/docs/PRD.md
      - has_sections:
          - Hipotese
          - Visao
          - User Stories
      - min_lines: 20
    next: gate.01.discovery

  - id: gate.01.discovery
    type: gate
    title: "Gate de discovery"
    executor: python
    sprint: sprint-01-discovery
    validators:
      - file_exists: project/docs/hipotese.md
      - file_exists: project/docs/PRD.md
    next: step.03.implementacao

  # Sprint 2: Build
  - id: step.03.implementacao
    type: build
    title: "Implementar funcionalidade basica"
    executor: llm_coder
    sprint: sprint-02-build
    outputs:
      - src/main.py
    validators:
      - file_exists: src/main.py
      - tests_pass: true
    next: gate.02.delivery

  - id: gate.02.delivery
    type: gate
    title: "Gate de delivery"
    executor: python
    sprint: sprint-02-build
    validators:
      - gate_delivery: true
    outputs:
      - src/main.py
    next: step.05.done

  # End
  - id: step.05.done
    type: end
    title: "Processo completo"
