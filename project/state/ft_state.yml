# Fast Track — Estado do Processo
# Estado do processo Fast Track

process_variant: fast_track
version: "0.6.4"

orchestrator: ft_manager
stakeholder_mode: interactive    # interactive | autonomous (flow: decisao_stakeholder_ciclo)
mdd_mode: normal                 # normal | hyper (flow: decisao_mdd_mode)
mvp_status: null                 # null | demonstravel | entregue
                                 # demonstravel: set pelo flow após ft_smoke_01 PASS
                                 # entregue: set pelo flow em ft_manager_handoff_completo
mvp_delivered: false
maintenance_mode: false      # true após ft.handoff.01.specs concluído; /feature é o fluxo após isso

# Quality & Strategy
min_coverage: 85             # cobertura mínima de testes (%) nos arquivos alterados
desired_coverage: 90         # cobertura desejável (%)
commit_strategy: per_task    # per_task | squash_cycle (> 5 tasks, ft_manager decide)
interface_type: cli_only     # cli_only | api | ui | mixed — definido no ft.plan.02.tech_stack

# Viewer para apresentar artefatos markdown ao stakeholder
# auto: detecta automaticamente (typora > code > xdg-open > open)
# ou path explícito: "typora", "code", "/usr/bin/gedit", etc.
artifact_viewer: auto

current_phase: ft_mdd        # ft_mdd | ft_plan | ft_tdd | ft_delivery | ft_e2e | ft_feedback
                             # atualizado implicitamente pelo ft_manager ao entrar em cada fase
current_cycle: cycle-01      # ex.: cycle-01
current_sprint: null         # sprint atual dentro do ciclo; preenchido em ft_sprint_prepare
sprint_status: planned       # planned | in_progress | fixing | completed
                             # in_progress: set por ft_sprint_prepare / ft_sprint_advance
                             # fixing: set por ft_sprint_expert_gate quando há pendências
                             # completed: set por ft_sprint_expert_gate quando aprovada
cycle_sprint_scope: []       # subset de planned_sprints selecionado para o ciclo atual
backlog_sprints: []          # planned_sprints fora do corte do ciclo atual (próximos ciclos)
planned_sprints: []          # [{id, goal, tasks, status}] — todas as sprints derivadas da task list
sprint_review_gate: ask_fast_track
sprint_review_log: {}

last_completed_step: null    # ex.: ft.mdd.01.hipotese — atualizado pelo ft_manager após cada step
next_step: ft.mdd.01.hipotese  # determinístico — o próximo step obrigatório, não uma sugestão
                               # atualizado pelo ft_manager com base no flow

completed_steps: []          # lista de step IDs concluídos — acumulador gerido pelo ft_manager

blocked: false
blocked_reason: null

# Paralelização (opt-in) — só populados quando parallel_mode: true
parallel_mode: false              # opt-in: habilita execução paralela de tasks em VTs independentes
parallel_max_agents: 3            # máximo de forge_coder simultâneos (slots de worktree)
parallel_tasks: []                # [{task_id, worktree, branch, status, agent_id}]
parallel_merge_queue: []          # task_ids prontos para merge (ordem de conclusão)
parallel_merge_status: idle       # idle | merging | conflict | done

# Gate enforcement — registro de gates executados por task
# Populado pelo ft_manager após cada chamada ao ft_gatekeeper
# Formato: {task_id: {gate_id: result, ...}, ...}
gate_log: {}
# Exemplo quando populado:
# gate_log:
#   T-01: {gate.delivery: PASS}
#   T-02: {gate.delivery: PASS}
#   T-03: {gate.delivery: BLOCK, gate.delivery.retry: PASS}

# Métricas simplificadas
metricas:
  tokens_consumidos: 0
  horas_consumidas: 0
  data_inicio: null
  ciclos_completos: 0
