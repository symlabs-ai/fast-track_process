# Feature — Evolução Incremental de Produto
#
# Este arquivo global nunca é executado diretamente. Na primeira invocação de
# `ft run . --template feature`, o engine materializa todo o diretório em
# `.ft/process/feature/` e executa somente a cópia local versionada.

id: feature
version: "1.3.0"
title: "Feature — Evolução Incremental"

execution_policy:
  entrypoint: run
  template: feature
  materialization: copy_once
  runtime_source: local_only
  requires_initialized_project: true
  requires_worktree: true
  local_process_path: .ft/process/feature/process.yml
  merge_command: ft close --merge full

input_policy:
  required: true
  destination: docs/feature-request.md
  prompt: "Descreva a feature a implementar"

correction_policy:
  follow_graph_after_retry: true
  scope_rejection_restarts_at: feature.discovery
  acceptance_rejection_restarts_at: feature.implement
  mandatory_after_implementation:
    - feature.review
    - feature.acceptance

# O mvp-builder decide todos os P0/P1 no encerramento do MVP. Um ciclo de
# feature decide apenas o PB selecionado; itens alheios permanecem no backlog.
close_policy:
  backlog:
    mode: referenced
    references_path: docs/feature.md
    reference_field: backlog_item
    required_count: 1
    accepted_statuses:
      - done
      - accepted
  features_catalog: required
  merge: full

artifact_policy:
  canonical:
    - CHANGELOG.md
    - docs/PRD.md
    - docs/TECH_STACK.md
    - docs/tech_stack.md
    - docs/ui_criteria.md
    - docs/api_contract.md
    - docs/test_data.md
    - docs/PROJECT_BACKLOG.md
    - docs/FEATURES.md
  cycle:
    - docs/feature-request.md
    - docs/feature-baseline.yml
    - docs/feature-baseline-attestation.json
    - docs/feature-discovery.md
    - docs/feature-questions.md
    - docs/feature.md
    - docs/feature-plan.md
    - docs/feature-workset.yml
    - docs/feature-id-reservation.yml
    - docs/implementation-report.md
    - docs/feature-evidence.yml
    - docs/feature-validation.json
    - docs/feature-review.md
    - docs/feature-review.yml
    - docs/feature-reconciliation.yml
    - docs/stakeholder-feedback.md
    - docs/feature-result.md
    - docs/screenshots/feature/

nodes:
  - id: feature.preflight
    type: gate
    title: "Preflight do Produto Existente"
    description: >-
      Confirma que a demanda está presente, o catálogo e o backlog são
      consistentes e a baseline do produto passa antes de qualquer alteração.
      Este gate é somente diagnóstico: uma baseline quebrada deve bloquear, não
      ser corrigida automaticamente como parte da feature.
    sprint: feature-01-scope
    executor: python
    validation_mode: fail_fast
    outputs:
      - docs/feature-baseline.yml
    validators:
      - file_exists: docs/feature-request.md
      - file_exists: docs/PRD.md
      - file_exists: docs/PROJECT_BACKLOG.md
      - file_exists: docs/FEATURES.md
      - project_backlog_valid:
          path: docs/PROJECT_BACKLOG.md
          min_items: 1
      - features_catalog_valid:
          path: docs/FEATURES.md
          backlog_path: docs/PROJECT_BACKLOG.md
      - implemented_backlog_covered_by_features:
          features_path: docs/FEATURES.md
          backlog_path: docs/PROJECT_BACKLOG.md
      - command_succeeds:
          command: "python .ft/process/feature/scripts/validate_feature.py baseline"
          stop_on_failure: true
      - command_succeeds:
          command: >-
            bash .ft/process/feature/scripts/product.sh ensure-baseline --record
            docs/feature-baseline-attestation.json
          resume_command: >-
            bash .ft/process/feature/scripts/product.sh verify-baseline
            docs/feature-baseline-attestation.json
          timeout: 300
    next: feature.discovery

  - id: feature.discovery
    no_pre_seed: true
    preserve_outputs_on_reentry: true
    context_profile: feature_delta.discovery
    type: discovery
    title: "Elucidar Demanda e Planejar Feature"
    description: >-
      Analisa a demanda contra produto, catálogo, backlog, código e testes.
      Formula somente perguntas que alterem comportamento, escopo, contrato ou
      aceite. Quando não houver ambiguidade, fecha a especificação e o plano.
    sprint: feature-01-scope
    executor: claude
    max_turns: 40
    llm_timeout_seconds: 600
    outputs:
      - docs/feature-discovery.md
      - docs/feature-questions.md
      - docs/feature.md
      - docs/feature-plan.md
      - docs/feature-workset.yml
    write_scope:
      - docs/feature-discovery.md
      - docs/feature-questions.md
      - docs/feature.md
      - docs/feature-plan.md
      - docs/feature-workset.yml
    prompt: |
      Trabalhe exclusivamente na elucidação de UMA feature para um produto já
      existente. Não implemente código neste node.

      Use o contexto delta fornecido pelo perfil `feature_delta.discovery`: ele
      já reúne a demanda imutável, o estado atual dos drafts, as fontes
      canônicas relevantes, a baseline e recortes do produto/testes. Abra
      arquivos adicionais somente quando uma decisão concreta exigir evidência.

      Determine se a demanda é:
      - new: uma única capacidade nova;
      - evolution: ampliação de uma FEAT-* existente;
      - improvement: melhoria/correção de uma FEAT-* existente.

      Se qualquer decisão alterar comportamento observável, contrato, dados,
      compatibilidade, critério de aceite ou fora de escopo, marque
      `clarification_status: required` em docs/feature-discovery.md e escreva
      perguntas numeradas e objetivas em docs/feature-questions.md. Não invente
      respostas. Gere feature.md e feature-plan.md como drafts coerentes com o
      que já é conhecido.

      Quando todas as decisões relevantes estiverem claras, marque exatamente
      `clarification_status: clear`, escreva em feature-questions.md que não há
      perguntas pendentes e finalize:

      docs/feature.md com frontmatter:
        type: new | evolution | improvement
        target_feature: new | FEAT-NNN
        backlog_item: PB-NNN
        priority: P0 | P1 | P2
        interface: ui | api | internal | mixed

      A demanda deve referenciar exatamente um PB-* já existente. Preserve esse
      ID e mantenha PROJECT_BACKLOG inalterado até a reconciliação pós-aceite.
      Ciclos paralelos devem usar PBs distintos; não aloque nem renumere PBs
      dentro da worktree.
      Para evolution/improvement, target_feature deve existir em FEATURES.

      feature.md deve conter Objetivo, Comportamento Esperado, Critérios de
      Aceite com IDs AC-01, AC-02..., Fora do Escopo e Restrições.

      feature-plan.md deve referenciar o mesmo PB-* e FEAT-*, listar impacto
      técnico, contratos afetados, tarefas ordenadas, estratégia de testes,
      compatibilidade/migração, evidências esperadas, riscos e a documentação
      canônica que precisará ser atualizada após o aceite. Todo ciclo deve
      prever a atualização de CHANGELOG.md, PROJECT_BACKLOG.md e FEATURES.md.

      feature-discovery.md deve preservar um resumo das perguntas e respostas
      que levaram ao escopo atual. Gere também docs/feature-workset.yml com uma
      lista curta de paths e testes provavelmente relevantes. Esse workset é uma
      dica focal e pode estar incompleto: nunca o trate como bloqueio rígido.
      Não altere código, PROJECT_BACKLOG nem FEATURES neste node.
    validators:
      - file_exists: docs/feature-discovery.md
      - file_exists: docs/feature-questions.md
      - file_exists: docs/feature.md
      - file_exists: docs/feature-plan.md
      - file_exists: docs/feature-workset.yml
      - project_backlog_valid:
          path: docs/PROJECT_BACKLOG.md
          min_items: 1
      - task_list_references_backlog:
          task_path: docs/feature-plan.md
          backlog_path: docs/PROJECT_BACKLOG.md
          min_refs: 1
      - command_succeeds: "python .ft/process/feature/scripts/validate_feature.py discovery"
    next: feature.discovery_gate

  - id: feature.discovery_gate
    type: gate
    title: "Registrar Resultado do Discovery"
    description: >-
      Extrai deterministicamente o estado de clarificação para que a decisão
      seguinte encaminhe perguntas pendentes ou congele o escopo.
    sprint: feature-01-scope
    executor: python
    validators:
      - read_artifact:
          path: docs/feature-discovery.md
          key: clarification_status
          pattern: "clarification_status:\\s*(required|clear)"
    next: feature.clarity

  - id: feature.clarity
    type: decision
    title: "Demanda Está Clara?"
    description: "Encaminha perguntas pendentes ao stakeholder ou congela o escopo."
    sprint: feature-01-scope
    executor: python
    condition: clarification_status
    branches:
      required: feature.questions
      clear: feature.reserve_ids
      _default: feature.questions

  - id: feature.questions
    type: human_gate
    title: "Perguntas sobre a Feature"
    description: >-
      Leia docs/feature-questions.md e responda somente às perguntas pendentes
      com `ft approve "1. ... 2. ..."`. As respostas voltam ao discovery. Para
      cancelar sem levar mudanças ao checkout principal, use ft abort.
    sprint: feature-01-scope
    executor: python
    outputs:
      - docs/feature-questions.md
      - docs/feature-discovery.md
    next: feature.discovery

  - id: feature.reserve_ids
    type: gate
    title: "Reservar Identidade da Entrega"
    description: >-
      Confirma o PB preexistente e, para type=new, reserva um FEAT-* definitivo
      sob lock curto no git comum. Reservas nunca são reutilizadas; ciclos de
      evolution/improvement preservam a FEAT alvo.
    sprint: feature-01-scope
    executor: python
    outputs:
      - docs/feature-id-reservation.yml
    validation_mode: fail_fast
    validators:
      - command_succeeds: "python .ft/process/feature/scripts/validate_feature.py reserve"
      - file_exists: docs/feature-id-reservation.yml
    next: feature.scope_gate

  - id: feature.scope_gate
    type: human_gate
    title: "Aprovação do Escopo da Feature"
    description: >-
      Revise docs/feature.md e docs/feature-plan.md. Confirme objetivo, AC-*,
      fora de escopo, PB/FEAT selecionados, impacto e estratégia de testes. Uma
      rejeição deve explicar objetivamente o que precisa mudar.
    sprint: feature-01-scope
    executor: python
    outputs:
      - docs/feature.md
      - docs/feature-plan.md
    reject_next: feature.discovery
    next: feature.implement

  - id: feature.implement
    type: build
    context_profile: feature_delta.implement
    title: "Implementar Feature e Testes"
    description: >-
      Implementa apenas código, testes e contratos executáveis do escopo
      aprovado. Evidências e relatórios são produzidos por um node separado.
    sprint: feature-02-build
    executor: claude
    max_turns: 60
    llm_timeout_seconds: 900
    llm_episode: feature_implementation
    llm_episode_budget_seconds: 1800
    llm_episode_max_calls: 2
    outputs:
      - project/
      - src/
    write_scope:
      - project
      - src
      - docs/api_contract.md
      - docs/ui_criteria.md
      - docs/screenshots/feature
    prompt: |
      Implemente somente a feature aprovada. O perfil
      `feature_delta.implement` já fornece escopo, plano, feedback atual, diff e
      recortes relevantes do produto. Inspecione arquivos adicionais apenas
      para confirmar a mudança focal e preserve comportamentos fora do escopo.

      Regras:
      1. Crie ou atualize testes para cada AC-* antes de concluir.
      2. Atualize api_contract/ui_criteria apenas quando o plano exigir.
      3. Não recrie scaffold, stack, Makefile ou infraestrutura do produto.
      4. Não atualize FEATURES nem conclua o PB antes do aceite humano.
      5. Durante a implementação, rode somente os testes focais necessários com
         `.ft/process/feature/scripts/product.sh focal -- <comando> [args...]`.
         Não repita a suíte completa: após sua entrega, o gate determinístico
         executará `full --record docs/feature-validation.json`, cobrindo build
         e test nessa ordem e vinculando o resultado ao snapshot executável do
         produto.
      6. Não produza relatórios ou evidências narrativas neste node; concentre a
         chamada em código e testes. O node evidence fará essa coleta.
      7. Em uma correção solicitada, considere o feedback mais recente e mantenha
         todo o restante aprovado funcionando.
    next: feature.product_validate

  - id: feature.product_validate
    type: gate
    title: "Validar Produto Implementado"
    description: >-
      Verifica primeiro a presença de mudanças e testes; somente então executa
      build+test uma vez. Em retomadas, ensure verifica o receipt local antes de
      considerar a suíte completa.
    sprint: feature-02-build
    executor: python
    outputs:
      - docs/feature-validation.json
    validation_mode: fail_fast
    validators:
      - command_succeeds:
          command: "python .ft/process/feature/scripts/validate_feature.py implementation"
          stop_on_failure: true
      - command_succeeds:
          command: >-
            bash .ft/process/feature/scripts/product.sh ensure --record
            docs/feature-validation.json
          resume_command: >-
            bash .ft/process/feature/scripts/product.sh verify
            docs/feature-validation.json
          timeout: 300
    on_fail:
      human_gate: "A validação do produto falhou; corrija a implementação preservada."
      goto: feature.implement
    next: feature.evidence

  - id: feature.evidence
    no_pre_seed: true
    preserve_outputs_on_reentry: true
    type: document
    context_profile: feature_delta.evidence
    title: "Coletar Evidências da Feature"
    description: >-
      Converte diff, testes e receipt já executado em evidência referencial por
      AC, sem alterar o produto nem repetir build/test.
    sprint: feature-02-build
    executor: claude
    max_turns: 24
    llm_timeout_seconds: 480
    outputs:
      - docs/implementation-report.md
      - docs/feature-evidence.yml
    write_scope:
      - docs/implementation-report.md
      - docs/feature-evidence.yml
      - docs/screenshots/feature
    prompt: |
      Produza apenas evidência da implementação já validada. Não altere código,
      testes, contratos ou o receipt e não repita build/test.

      Gere docs/implementation-report.md com uma linha PASS/FAIL por AC-*, os
      arquivos alterados, compatibilidade e os comandos presentes no receipt.
      Gere docs/feature-evidence.yml (schema_version: 1) com `receipt`,
      `commands` e uma lista `acceptance`; cada item deve conter `id`, `status`,
      `tests` e `artifacts`. Paths devem existir. Screenshots só são exigidos
      quando o contrato aprovado os prevê. A suficiência semântica continuará
      sendo responsabilidade da revisão independente.
    next: feature.evidence_gate

  - id: feature.evidence_gate
    type: gate
    title: "Validar Integridade das Evidências"
    description: >-
      Confirma referências, ACs, paths e receipt. Não tenta decidir se um teste
      demonstra semanticamente o comportamento; isso pertence à review.
    sprint: feature-02-build
    executor: python
    validation_mode: fail_fast
    validators:
      - file_exists: docs/implementation-report.md
      - file_exists: docs/feature-evidence.yml
      - command_succeeds:
          command: "bash .ft/process/feature/scripts/product.sh verify docs/feature-validation.json"
          stop_on_failure: true
      - command_succeeds: "python .ft/process/feature/scripts/validate_feature.py evidence"
    on_fail:
      human_gate: "As referências de evidência estão incompletas; regenere somente a evidência."
      goto: feature.evidence
    next: feature.review

  - id: feature.review
    type: review
    review_route_path: docs/feature-review.yml
    context_profile: feature_delta.review
    title: "Revisão Independente da Feature"
    description: >-
      Audita diff, testes e evidências contra cada AC-*, procurando regressões,
      quebra de contrato e expansão de escopo antes do stakeholder.
    sprint: feature-02-build
    executor: claude
    max_turns: 50
    llm_timeout_seconds: 600
    outputs:
      - docs/feature-review.md
      - docs/feature-review.yml
    write_scope:
      - docs/feature-review.md
      - docs/feature-review.yml
    prompt: |
      Faça uma revisão independente usando o contexto focal fornecido por
      `feature_delta.review`: contrato, plano, relatório, diff, código/testes
      alterados e resumo do receipt. O validator determinístico deste node
      confirma o receipt; não o reexecute por conta própria.

      Não repita a suíte completa nem o build já atestados pelo receipt. Quando
      precisar desafiar uma hipótese ou um AC-*, execute somente sondas/testes
      focais com `product.sh focal -- <comando> [args...]`. Qualquer alteração no
      produto invalida deterministicamente o receipt e exige nova implementação.

      Gere docs/feature-review.md com uma tabela de todos os AC-*, regressões,
      compatibilidade, scope creep e evidências. Gere também
      docs/feature-review.yml com schema_version: 1, verdict, review_route e
      summary. `review_route` deve ser exatamente approved, implementation,
      evidence ou scope: use implementation para defeito no produto, evidence
      para prova ausente/inadequada e scope para contradição do contrato.
    validation_mode: fail_fast
    validators:
      - file_exists: docs/feature-review.md
      - file_exists: docs/feature-review.yml
      - command_succeeds:
          command: "bash .ft/process/feature/scripts/product.sh verify docs/feature-validation.json"
          stop_on_failure: true
      - command_succeeds: "python .ft/process/feature/scripts/validate_feature.py review"
    next: feature.review_route

  - id: feature.review_route
    type: gate
    title: "Registrar Rota da Revisão"
    sprint: feature-02-build
    executor: python
    validators:
      - read_artifact:
          path: docs/feature-review.yml
          key: review_route
          pattern: "review_route:\\s*(approved|implementation|evidence|scope)"
    next: feature.review_decision

  - id: feature.review_decision
    type: decision
    title: "Encaminhar Veredicto da Revisão"
    sprint: feature-02-build
    executor: python
    condition: review_route
    branches:
      approved: feature.acceptance
      implementation: feature.implement
      evidence: feature.evidence
      scope: feature.discovery
      _default: feature.review
    episode_restart:
      implementation: feature_implementation
      scope: feature_implementation

  - id: feature.acceptance
    type: human_gate
    title: "Aceite da Feature"
    description: >-
      Valide a capacidade implementada e seus AC-*. UI/API sobe pelo serve.sh;
      mudanças internas são avaliadas pelos relatórios e testes. Rejeite com um
      desvio reproduzível. Toda correção volta à implementação e produz um novo
      receipt após uma validação completa do estado corrigido.
    sprint: feature-03-acceptance
    executor: python
    env_setup:
      - bash .ft/process/feature/scripts/serve.sh
    env_teardown:
      - bash .ft/process/feature/scripts/serve.sh stop
    outputs:
      - docs/stakeholder-feedback.md
    reject_next: feature.implement
    next: feature.reconcile

  - id: feature.reconcile
    no_pre_seed: true
    type: document
    context_profile: feature_delta.reconcile
    title: "Reconciliar Backlog e Catálogo"
    description: >-
      Propõe somente a capacidade aceita neste ciclo. O validator confere IDs e
      aplica a proposta deterministicamente antes de validar a reconciliação.
    sprint: feature-03-acceptance
    executor: claude
    max_turns: 40
    llm_timeout_seconds: 480
    outputs:
      - docs/feature-reconciliation.yml
      - docs/feature-result.md
    write_scope:
      - docs/feature-reconciliation.yml
      - docs/feature-result.md
    prompt: |
      O stakeholder aprovou a feature. Proponha a reconciliação em
      docs/feature-reconciliation.yml; não edite diretamente os documentos
      canônicos. O validator aplicará o conteúdo proposto somente após conferir
      paths e IDs autorizados.

      - Marque o PB selecionado como accepted e registre evidências reais.
      - type=new: use exatamente o FEAT-* de feature-id-reservation.yml.
      - evolution/improvement: preserve a FEAT-* alvo, acrescente o PB, atualize
        evidência, descrição quando necessário e Última evolução.
      - Nunca renumere, reutilize ou apague IDs.
      - Bugs/dívidas/manutenção não criam uma FEAT-* nova.
      - Não decida, adie ou conclua itens de backlog alheios ao ciclo.
      - Atualize somente a documentação canônica realmente afetada pelo
        comportamento, contrato, configuração ou uso da feature; não faça churn
        em documentos alheios.
      - Crie ou atualize sempre CHANGELOG.md na raiz, preservando o formato já
        adotado pelo projeto. Preserve seções e o estilo de bullet existente,
        mas faça a entrada deste ciclo começar com `#FEAT` como primeiro token
        textual (`#FEAT ...` ou `- #FEAT ...`). Registre de forma humana o
        PB/FEAT, a mudança entregue e qualquer compatibilidade ou migração
        relevante.

      O YAML deve ter schema_version: 1, backlog_item, target_feature,
      final_feature_id, `backlog_row`, `feature_row`, `changelog_entry` e
      `documentation`. Forneça somente a linha Markdown completa do PB, a linha
      Markdown completa da FEAT e uma única entrada de changelog; o engine
      preservará o restante das tabelas e inserirá essas operações
      deterministicamente. `documentation` é um mapping opcional de outros
      paths canônicos afetados para seu conteúdo completo; não inclua nele
      CHANGELOG, PROJECT_BACKLOG ou FEATURES.

      Gere docs/feature-result.md com escopo entregue, AC-*, testes/build,
      evidências, PB/FEAT final, arquivos alterados, nenhuma pendência escondida
      e uma seção `Documentação atualizada` que liste os caminhos realmente
      reconciliados, incluindo sempre CHANGELOG.md, docs/PROJECT_BACKLOG.md e
      docs/FEATURES.md.
    validation_mode: fail_fast
    validators:
      - file_exists: docs/feature-reconciliation.yml
      - file_exists: docs/feature-result.md
      - command_succeeds:
          command: "python .ft/process/feature/scripts/validate_feature.py proposal"
          stop_on_failure: true
      - command_succeeds:
          command: "python .ft/process/feature/scripts/validate_feature.py apply-reconcile"
          stop_on_failure: true
      - project_backlog_valid:
          path: docs/PROJECT_BACKLOG.md
          min_items: 1
      - features_catalog_valid:
          path: docs/FEATURES.md
          backlog_path: docs/PROJECT_BACKLOG.md
      - implemented_backlog_covered_by_features:
          features_path: docs/FEATURES.md
          backlog_path: docs/PROJECT_BACKLOG.md
      - command_succeeds: "python .ft/process/feature/scripts/validate_feature.py reconcile"
    next: feature.final_gate

  - id: feature.final_gate
    type: gate
    title: "Gate Final da Feature"
    description: >-
      Confirma que o código ainda corresponde ao snapshot do receipt completo
      pós-implementação e valida os documentos reconciliados antes de declarar
      a worktree pronta para merge. Se qualquer arquivo, lockfile, script,
      ferramenta ou comando mudou, o receipt falha e a suíte deve ser refeita.
    sprint: feature-03-acceptance
    executor: python
    validation_mode: fail_fast
    outputs:
      - docs/feature-result.md
    validators:
      - command_succeeds: "bash .ft/process/feature/scripts/product.sh verify docs/feature-validation.json"
      - command_succeeds: "python .ft/process/feature/scripts/validate_feature.py reconcile"
    next: feature.end

  - id: feature.end
    type: end
    title: "Feature Pronta para Merge"
    description: >-
      Feature aceita e validada na worktree. Execute `ft close --merge full` para
      arquivar o ciclo, fazer merge no checkout principal e remover worktree e
      branch temporária. Use `ft abort` para descartar sem merge.
